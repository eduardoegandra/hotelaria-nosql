{% extends "base.html" %}
{% block conteudo %}
    <h1>Hóspedes</h1>
    <a href="{{ url_for('hospedes.novo_hospede') }}"><button>Novo Hóspede</button></a>
    <table>
        <tr>
            <th>CPF</th><th>Nome</th><th>Telefone</th><th>E-mail</th><th>Ações</th>
        </tr>
        {% for h in hospedes %}
        <tr>
            <td>{{ h.cpf }}</td>
            <td>{{ h.nome }}</td>
            <td>{{ h.telefone }}</td>
            <td>{{ h.email }}</td>
            <td>
                <a href="{{ url_for('hospedes.editar_hospede', id=h._id) }}">Editar</a> |
                <a href="{{ url_for('hospedes.excluir_hospede', id=h._id) }}">Excluir</a>
            </td>
        </tr>
        {% endfor %}
    </table>
{% endblock %}
