{% extends "base.html" %}
{% block conteudo %}
    <h1>Nova Reserva</h1>
    <form method="POST">
        <label>Hóspede</label>
        <select name="hospede_cpf" required>
            {% for h in hospedes %}
            <option value="{{ h.cpf }}">{{ h.nome }} ({{ h.cpf }})</option>
            {% endfor %}
        </select>
        <label>Quarto</label>
        <select name="quarto_numero" required>
            {% for q in quartos %}
            <option value="{{ q.numero }}">Quarto {{ q.numero }} - {{ q.tipo }}</option>
            {% endfor %}
        </select>
        <label>Funcionário Responsável</label>
        <select name="funcionario_id" required>
            {% for f in funcionarios %}
            <option value="{{ f.id_func }}">{{ f.nome }} ({{ f.cargo }})</option>
            {% endfor %}
        </select>
        <label>Check-in</label>
        <input type="date" name="data_checkin" required>
        <label>Check-out</label>
        <input type="date" name="data_checkout" required>
        <label>Status</label>
        <select name="status">
            <option value="confirmada">Confirmada</option>
            <option value="pendente">Pendente</option>
            <option value="cancelada">Cancelada</option>
        </select>
        <label>Valor Total</label>
        <input type="number" step="0.01" name="valor_total" required>
        <button type="submit">Salvar</button>
    </form>
{% endblock %}
